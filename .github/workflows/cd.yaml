name: CD

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Update Manifests
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Kubernetes manifests
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_PREFIX="${{ env.REGISTRY }}/$REPO_LOWER"
          TAG="sha-${{ github.event.workflow_run.head_sha }}"

          for SERVICE in article-service user-service payment-service fraud-detection-service frontend; do
            sed -i "s|image: .*$SERVICE.*|image: $IMAGE_PREFIX/$SERVICE:$TAG|g" \
              infrastructure/kubernetes/services/$SERVICE.yaml || true
          done

      - name: Commit & push
        run: |
          git config user.name 'GitHub Actions'
          git config user.email 'actions@github.com'
          git add infrastructure/kubernetes/services/*.yaml
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: update manifests to sha-${{ github.event.workflow_run.head_sha }} [skip ci]"
            git push
          fi
