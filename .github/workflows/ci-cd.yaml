name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io

jobs:
  service-pipeline:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: article-service
            context: services/article-service
            type: backend
          - service: user-service
            context: services/user-service
            type: backend
          - service: payment-service
            context: services/payment-service
            type: backend
          - service: fraud-detection-service
            context: services/fraud-detection-service
            type: backend
          - service: frontend
            context: frontend
            type: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Env
        id: prep
        run: |
          # Lowercase the repo name for Docker image standards
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "valid_image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      # --- Quality & Tests ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install Dependencies
        run: |
          cd ${{ matrix.context }}
          npm ci

      - name: Lint
        run: |
          cd ${{ matrix.context }}
          npm run lint

      - name: Run Tests
        run: |
          cd ${{ matrix.context }}
          if [ "${{ matrix.type }}" == "frontend" ]; then
            npm run test:unit || echo "No unit tests found (skipping)"
          else
            npm run test
          fi

      # --- Build & Push ---
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.prep.outputs.valid_image_name }}/${{ matrix.service }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trivy Scan (Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.prep.outputs.valid_image_name }}/${{ matrix.service }}:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  deploy:
    name: Update Manifests
    needs: service-pipeline
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Kubernetes manifests
        run: |
          cd infrastructure/kubernetes/services
          
          # Compute valid prefix (lowercase) matches the one used in build
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_PREFIX="${{ env.REGISTRY }}/$REPO_LOWER"
          TAG="sha-${{ github.sha }}"
           
          SERVICES="article-service user-service payment-service fraud-detection-service frontend"
          
          for SERVICE in $SERVICES; do
            echo "Updating $SERVICE to $TAG"
            sed -i "s|image: .*$SERVICE.*|image: $IMAGE_PREFIX/$SERVICE:$TAG|g" $SERVICE.yaml || true
          done

      - name: Commit and Push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add infrastructure/kubernetes/services/*.yaml
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update kubernetes manifests [skip ci]"
            git push
          fi
