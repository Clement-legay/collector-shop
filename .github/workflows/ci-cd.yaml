name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME: ${{ github.repository }} (will be set dynamically to handle casing)

jobs:
  lowercase-repo:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.lowercase.outputs.image_name }}
    steps:
      - id: lowercase
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT

  tests:
    name: Tests & Quality
    needs: lowercase-repo
    env:
      IMAGE_NAME: ${{ needs.lowercase-repo.outputs.image_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install Dependencies
        run: |
          npm ci
          cd frontend && npm ci
          cd ../services/article-service && npm ci
          cd ../user-service && npm ci
          cd ../payment-service && npm ci
          cd ../fraud-detection-service && npm ci

      # Linting
      - name: Run ESLint (Article Service)
        run: cd services/article-service && npm run lint
      - name: Run ESLint (User Service)
        run: cd services/user-service && npm run lint
      - name: Run ESLint (Payment Service)
        run: cd services/payment-service && npm run lint
      - name: Run ESLint (Fraud Service)
        run: cd services/fraud-detection-service && npm run lint
      # - name: Run ESLint (Frontend)
      #   run: cd frontend && npm run lint

      # Unit Tests
      - name: Run Tests (Article Service)
        run: cd services/article-service && npm run test
      - name: Run Tests (User Service)
        run: cd services/user-service && npm run test
      - name: Run Tests (Payment Service)
        run: cd services/payment-service && npm run test
      - name: Run Tests (Fraud Service)
        run: cd services/fraud-detection-service && npm run test
      - name: Run Tests (Frontend)
        run: cd frontend && npm run test:unit || echo "No tests yet"

      # SonarQube (Optional - requires configuration)
      # - name: SonarQube Scan
      #   uses: sonarsource/sonarqube-scan-action@master
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #     SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # Security Scan (Config files)
      - name: Run Trivy vulnerability scanner (Config)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          hide-progress: false
          format: 'table'
          exit-code: '0' # Don't fail for now
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  build-and-push:
    name: Build & Push
  build-and-push:
    name: Build & Push
    needs: [lowercase-repo, tests]
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ needs.lowercase-repo.outputs.image_name }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [article-service, user-service, payment-service, fraud-detection-service, frontend]
        include:
          - service: article-service
            context: services/article-service
          - service: user-service
            context: services/user-service
          - service: payment-service
            context: services/payment-service
          - service: fraud-detection-service
            context: services/fraud-detection-service
          - service: frontend
            context: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Run Trivy scanner (Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  deploy:
    name: Update Manifests
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Request Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update Kubernetes manifests
        run: |
          cd infrastructure/kubernetes/services
          
          # We don't use Kustomize strictly here, we just use sed for simplicity if kustomize files aren't set up perfectly
          # But let's try to be cleaner. Since we didn't setup kustomization.yaml, we'll use sed.
          
          SERVICES="article-service user-service payment-service fraud-detection-service frontend"
          IMAGE_PREFIX="${{ env.REGISTRY }}/${{ github.repository_owner }}"
          TAG="sha-${{ github.sha }}"
           
          # Note: The 'sha-' prefix is added by docker/metadata-action default behavior for type=sha
          
          for SERVICE in $SERVICES; do
            echo "Updating $SERVICE to $TAG"
            # Since manifests use local tags by default, simply replace the whole image line
            # We match 'image: .*service-name.*'
            
            sed -i "s|image: .*$SERVICE.*|image: $IMAGE_PREFIX/$SERVICE:$TAG|g" $SERVICE.yaml || true
          done

      - name: Commit and Push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add infrastructure/kubernetes/services/*.yaml
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update kubernetes manifests [skip ci]"
            git push
          fi
