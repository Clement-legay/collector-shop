name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # ─── Job 1 : Install & cache dependencies once for all services ───────────
  setup:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            services/*/node_modules
            frontend/node_modules
          key: node-modules-${{ github.run_id }}-${{ hashFiles('**/package-lock.json') }}

  # ─── Job 2 : Per-service pipeline (parallel) ──────────────────────────────
  service-pipeline:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: article-service
            context: services/article-service
            type: backend
          - service: user-service
            context: services/user-service
            type: backend
          - service: payment-service
            context: services/payment-service
            type: backend
          - service: fraud-detection-service
            context: services/fraud-detection-service
            type: backend
          - service: frontend
            context: frontend
            type: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            services/*/node_modules
            frontend/node_modules
          key: node-modules-${{ github.run_id }}-${{ hashFiles('**/package-lock.json') }}

      - name: Lint
        run: cd ${{ matrix.context }} && npm run lint

      - name: Test
        run: |
          cd ${{ matrix.context }}
          if [ "${{ matrix.type }}" == "frontend" ]; then
            npm run test:unit || echo "No unit tests (skipping)"
          else
            npm run test
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: prep
        run: |
          IMAGE=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ steps.prep.outputs.image }}/${{ matrix.service }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build (local — for Trivy scan)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          load: true
          push: false
          tags: ${{ env.REGISTRY }}/${{ steps.prep.outputs.image }}/${{ matrix.service }}:sha-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.prep.outputs.image }}/${{ matrix.service }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 3 : CodeQL — Static Application Security Testing (SAST) ───────────
  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
          output: sarif-results

      - name: Fail on CodeQL findings
        run: |
          SARIF=$(ls sarif-results/*.sarif 2>/dev/null | head -1)
          if [ -z "$SARIF" ]; then
            echo "No SARIF file found, skipping check"
            exit 0
          fi
          COUNT=$(jq '[.runs[].results[] | select(.level == "error" or .level == "warning")] | length' "$SARIF")
          if [ "$COUNT" -gt 0 ]; then
            echo "::error::CodeQL found $COUNT issue(s) — check the Security tab for details"
            exit 1
          fi
          echo "✅ No CodeQL error/warning findings"

  # ─── Job 4 : Update K8s manifests with new image tags (main only) ─────────
  update-manifests:
    name: Update Kubernetes manifests
    runs-on: ubuntu-latest
    needs: [service-pipeline, codeql]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_PREFIX="${{ env.REGISTRY }}/$REPO_LOWER"
          TAG="sha-${{ github.sha }}"

          for SERVICE in article-service user-service payment-service fraud-detection-service frontend; do
            sed -i "s|image: .*$SERVICE.*|image: $IMAGE_PREFIX/$SERVICE:$TAG|g" \
              infrastructure/kubernetes/services/$SERVICE.yaml || true
          done

      - name: Commit & push
        run: |
          git config user.name 'GitHub Actions'
          git config user.email 'actions@github.com'
          git add infrastructure/kubernetes/services/*.yaml
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: update manifests to sha-${{ github.sha }} [skip ci]"
            git push
          fi

