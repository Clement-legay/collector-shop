server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy calls to backend services if needed, 
    # but strictly speaking Ingress should handle this external to the pod.
    # However, if we want local dev with docker-compose later, this might be useful.
    # For Kubernetes, Ingress handles /api routes, so this block is mostly for safety 
    # or direct pod access (uncommon).
    
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
