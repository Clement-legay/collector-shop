apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-service
  namespace: collector
  labels:
    app: fraud-detection-service
    app.kubernetes.io/name: fraud-detection-service
    app.kubernetes.io/instance: collector
spec:
  replicas: 2
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: fraud-detection-service
  template:
    metadata:
      labels:
        app: fraud-detection-service
        app.kubernetes.io/name: fraud-detection-service
        app.kubernetes.io/instance: collector
    spec:
      containers:
        - name: fraud-detection-service
          image: ghcr.io/clement-legay/collector-shop/fraud-detection-service:sha-737e6444391201513b2e5fe07b31856e1247383c
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3004
          env:
            - name: DATABASE_HOST
              value: "postgresql"
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: "fraud_db"
            - name: DATABASE_USER
              value: "collector"
            - name: DATABASE_PASSWORD
              value: "collector_password"
            - name: DATABASE_SCHEMA
              value: "fraud"
            - name: RABBITMQ_HOST
              value: "rabbitmq"
            - name: RABBITMQ_USER
              value: "collector"
            - name: RABBITMQ_PASS
              value: "collector_password"
            - name: JAEGER_AGENT_HOST
              value: "jaeger"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: fraud-detection-service
  namespace: collector
spec:
  ports:
    - port: 3004
      targetPort: 3004
      name: http
  selector:
    app: fraud-detection-service
