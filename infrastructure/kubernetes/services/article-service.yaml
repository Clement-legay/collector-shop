apiVersion: apps/v1
kind: Deployment
metadata:
  name: article-service
  namespace: collector
  labels:
    app: article-service
    app.kubernetes.io/name: article-service
    app.kubernetes.io/instance: collector
spec:
  replicas: 2
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: article-service
  template:
    metadata:
      labels:
        app: article-service
        app.kubernetes.io/name: article-service
        app.kubernetes.io/instance: collector
    spec:
      containers:
        - name: article-service
          image: ghcr.io/clement-legay/collector-shop/article-service:sha-42ad19fc09bea8ac3aa2146138ad295ea0a39c98
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_HOST
              value: "postgresql"
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: "article_db"
            - name: DATABASE_USER
              value: "collector"
            - name: DATABASE_PASSWORD
              value: "collector_password"
            - name: DATABASE_SCHEMA
              value: "articles"
            - name: RABBITMQ_HOST
              value: "rabbitmq"
            - name: RABBITMQ_USER
              value: "collector"
            - name: RABBITMQ_PASS
              value: "collector_password"
            - name: JAEGER_AGENT_HOST
              value: "jaeger"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: article-service
  namespace: collector
spec:
  ports:
    - port: 3001
      targetPort: 3001
      name: http
  selector:
    app: article-service
