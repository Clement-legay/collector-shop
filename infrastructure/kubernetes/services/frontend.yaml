apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: collector
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/clement-legay/collector-shop/frontend:sha-5d37ae9dc0eb1081999588985f1f08b7b9a9cd18
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: API_BASE_URL
              value: "http://collector.local"

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: collector
spec:
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: frontend
