apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: collector
  labels:
    app.kubernetes.io/part-of: frontend
    app: frontend
    app.kubernetes.io/name: frontend
    app.kubernetes.io/instance: collector
spec:
  replicas: 2
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: frontend
        app: frontend
        app.kubernetes.io/name: frontend
        app.kubernetes.io/instance: collector
    spec:
      containers:
        - name: frontend
          image: ghcr.io/clement-legay/collector-shop/frontend:sha-e9fa3d7ce0f9f7812653b14cd9f95f2cd97a3dc4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: API_BASE_URL
              value: "http://collector.local"

---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/part-of: frontend
  name: frontend
  namespace: collector
spec:
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: frontend
