apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: collector
  labels:
    app: grafana
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
        app.kubernetes.io/name: grafana
        app.kubernetes.io/instance: collector
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s/grafana/"
            - name: GF_SERVER_DOMAIN
              value: "collector.local"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: grafana-storage
              mountPath: /var/lib/grafana

      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboards-config
          configMap:
            name: grafana-dashboards-config
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: collector
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: collector
data:
  prometheus.yaml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: collector
spec:
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: grafana

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: collector
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: collector
data:
  user-dashboard.json: |
    {
      "title": "User Service Overview",
      "schemaVersion": 36,
      "refresh": "5s",
      "panels": [
        {
          "title": "User Service Overview - Service Uptime",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 5
          },
          "targets": [
            {
              "expr": "sum(up{job=\"user-service\"})",
              "legendFormat": "Endpoints UP"
            }
          ],
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2,
                "gradientMode": "opacity"
              }
            }
          }
        },
        {
          "title": "HTTP P95 Latency by Route (Seconds)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 0,
            "y": 5,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"user-service\"}[5m])) by (le, method, path))",
              "legendFormat": "{{method}} {{path}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "fillOpacity": 10,
                "lineWidth": 2,
                "spanNulls": true
              }
            }
          }
        },
        {
          "title": "HTTP P99 Latency by Route (Seconds)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 12,
            "y": 5,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"user-service\"}[5m])) by (le, method, path))",
              "legendFormat": "{{method}} {{path}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "fillOpacity": 10,
                "lineWidth": 2,
                "spanNulls": true
              }
            }
          }
        },
        {
          "title": "HTTP Error Rate (%)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 0,
            "y": 13,
            "w": 24,
            "h": 6
          },
          "targets": [
            {
              "expr": "sum(rate(http_request_duration_seconds_count{job=\"user-service\", status=~\"5..|4..\"}[5m])) / sum(rate(http_request_duration_seconds_count{job=\"user-service\"}[5m])) * 100",
              "legendFormat": "Error Rate"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": {
                "fillOpacity": 20,
                "lineWidth": 2
              }
            }
          }
        },
        {
          "title": "Total Users Registered",
          "type": "stat",
          "gridPos": {
            "x": 0,
            "y": 19,
            "w": 12,
            "h": 6
          },
          "targets": [
            {
              "expr": "sum(users_registered_total)"
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          }
        },
        {
          "title": "Registration Logs (Emails)",
          "type": "table",
          "gridPos": {
            "x": 12,
            "y": 19,
            "w": 12,
            "h": 6
          },
          "targets": [
            {
              "expr": "max_over_time(users_registered_total[24h]) > 0",
              "format": "table",
              "instant": true
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          }
        }
      ]
    }
