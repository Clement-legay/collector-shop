apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: collector
  labels:
    app: grafana
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
        app.kubernetes.io/name: grafana
        app.kubernetes.io/instance: collector
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s/grafana/"
            - name: GF_SERVER_DOMAIN
              value: "collector.local"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: grafana-storage
              mountPath: /var/lib/grafana

      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboards-config
          configMap:
            name: grafana-dashboards-config
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: collector
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: collector
data:
  prometheus.yaml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: collector
spec:
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: grafana

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: collector
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: collector
data:
  collector-dashboard.json: |
    {
      "title": "Collector Microservices",
      "schemaVersion": 36,
      "refresh": "5s",
      "panels": [
        {
          "title": "Total Users Registered",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 8, "h": 6 },
          "targets": [ { "expr": "sum(users_registered_total)" } ]
        },
        {
          "title": "Total Payments Completed",
          "type": "stat",
          "gridPos": { "x": 8, "y": 0, "w": 8, "h": 6 },
          "targets": [ { "expr": "sum(payments_completed_total)" } ]
        },
        {
          "title": "Total Articles Created",
          "type": "stat",
          "gridPos": { "x": 16, "y": 0, "w": 8, "h": 6 },
          "targets": [ { "expr": "sum(articles_created_total)" } ]
        },
        {
          "title": "Fraud Alerts",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 6, "w": 12, "h": 8 },
          "targets": [
            { "expr": "sum(rate(fraud_alerts_total[5m])) by (severity)", "legendFormat": "{{severity}}" }
          ]
        },
        {
          "title": "Events Processed",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 6, "w": 12, "h": 8 },
          "targets": [
            { "expr": "sum(rate(events_processed_total[5m])) by (event_type)", "legendFormat": "{{event_type}}" }
          ]
        },
        {
          "title": "Registration Logs (Emails)",
          "type": "table",
          "gridPos": { "x": 0, "y": 14, "w": 8, "h": 7 },
          "targets": [
            { "expr": "max_over_time(users_registered_total[24h]) > 0", "format": "table", "instant": true }
          ]
        },
        {
          "title": "Login Logs (Emails)",
          "type": "table",
          "gridPos": { "x": 8, "y": 14, "w": 8, "h": 7 },
          "targets": [
            { "expr": "max_over_time(logins_total[24h]) > 0", "format": "table", "instant": true }
          ]
        },
        {
          "title": "Fraud Alert Logs (Details)",
          "type": "table",
          "gridPos": { "x": 16, "y": 14, "w": 8, "h": 7 },
          "targets": [
            { "expr": "max_over_time(fraud_alerts_total[24h]) > 0", "format": "table", "instant": true }
          ]
        }
      ]
    }
