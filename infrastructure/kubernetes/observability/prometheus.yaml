apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: collector
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'article-service'
        static_configs:
          - targets: ['article-service:3001']
      - job_name: 'user-service'
        static_configs:
          - targets: ['user-service:3002']
      - job_name: 'payment-service'
        static_configs:
          - targets: ['payment-service:3003']
      - job_name: 'fraud-detection-service'
        static_configs:
          - targets: ['fraud-detection-service:3004']

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: collector
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - containerPort: 9090
              name: web
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-storage
              mountPath: /prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-storage
          persistentVolumeClaim:
            claimName: prometheus-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: collector
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: collector
spec:
  ports:
    - port: 9090
      targetPort: 9090
      name: web
  selector:
    app: prometheus
