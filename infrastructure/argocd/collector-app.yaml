apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: collector
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Clement-legay/collector-shop.git
    targetRevision: HEAD
    path: infrastructure/kubernetes
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: collector
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
